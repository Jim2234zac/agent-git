<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบสั่งอาหาร - เมนู</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/translations.js"></script>
</head>
<body>
  <header>
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <h1>🍽️ <span id="headerTitle">ระบบสั่งอาหารออนไลน์</span></h1>
      <div class="language-toggle">
        <button onclick="setLanguage('th')" class="lang-btn active" id="langTh">ไทย</button>
        <button onclick="setLanguage('en')" class="lang-btn" id="langEn">English</button>
      </div>
    </div>
    <p id="tableInfo"></p>
  </header>

  <nav>
    <a href="/menu" class="active"><span id="navMenu">🍴 เมนู</span></a>
    <a href="/cart"><span id="navCart">🛒 ตะกร้า</span></a>
  </nav>

  <div class="container">
    <!-- Table Selection (ถ้าจำเป็น) -->
    <div id="tableSelection" style="display: none; margin: 20px 0; text-align: center;">
      <input type="number" id="tableNumber" placeholder="" min="1" max="99" class="table-input" style="max-width: 300px;">
      <button onclick="setTableNumber()" class="checkout-btn" style="max-width: 300px;"><span id="confirmTableBtn">ยืนยันโต๊ะ</span></button>
    </div>

    <!-- Category Filter -->
    <div class="category-filter" id="categoryFilter">
      <!-- จะอัปเดตด้วย JavaScript จาก API -->
    </div>

    <!-- Menu Grid -->
    <div class="menu-grid" id="menuGrid">
      <!-- จะอัปเดตด้วย JavaScript -->
    </div>

    <div id="loading" style="text-align: center; padding: 40px;">
      <p id="loadingText">⏳ กำลังโหลดเมนู...</p>
    </div>
  </div>

  <!-- Add to Cart with Notes Modal -->
  <div id="notesModal" class="modal" style="display: none;">
    <div class="modal-content" style="max-width: 500px;">
      <h2 style="margin-bottom: 15px;">📝 เพิ่มหมายเหตุ</h2>
      <div style="margin-bottom: 20px;">
        <p id="itemNameDisplay" style="font-size: 18px; font-weight: bold; color: var(--primary-color); margin-bottom: 10px;"></p>
        <label style="display: block; margin-bottom: 8px; font-weight: 600;">หมายเหตุพิเศษ (เช่น ไม่เอาผัก ไม่เผ็ด): </label>
        <textarea id="itemNotes" class="table-input" rows="4" placeholder="กรุณากรอกหมายเหตุเพิ่มเติม..." style="margin: 0; resize: vertical;"></textarea>
        <small style="display: block; color: #999; margin-top: 5px;">หมายเหตุนี้จะปรากฏในหน้าตะกร้าและคำสั่ง</small>
      </div>
      <div class="modal-buttons" style="display: flex; gap: 10px; justify-content: flex-end;">
        <button class="modal-btn modal-btn-cancel" onclick="closeNotesModal()">ยกเลิก</button>
        <button class="modal-btn modal-btn-confirm" style="background-color: var(--secondary-color); color: white;" onclick="confirmAddToCart()">✓ เพิ่มลงตะกร้า</button>
      </div>
    </div>
  </div>

  <script src="/js/menu.js"></script>
</body>
</html>
